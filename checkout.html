<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | TechMotors Car Sales</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Contact TechMotors </h1>
    
    
    <nav>
      <a href="index.html">Home</a>
      <a href="cars.html">Browse Cars</a>
      <a href="checkout.html">Contact Us</a>
    </nav>
  </header>

  <main class="home-container">
    <section>
      <h2>Get in Touch</h2>
      <form id="contactForm">
        <label for="name">Full Name:</label>
        <input type="text" id="name" required>
        <label for="email">Email Address:</label>
        <input type="email" id="email" required>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone">
        <label for="car">Car of Interest:</label>
        <input type="text" id="car">
        <label for="message">Your Message:</label>
        <textarea id="message" rows="5" required></textarea>
        <button type="submit">Send Inquiry</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 TechMotors Car Sales. All rights reserved.</p>
  </footer>
  <script src="script.js" defer></script>
</body>
</html>
